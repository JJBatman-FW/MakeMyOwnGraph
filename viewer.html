<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀表板預覽</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcvwNe51K8T3f-58oiNIU-WQbQZuYjOAo",
            authDomain: "makeowndashboard.firebaseapp.com",
            projectId: "makeowndashboard",
            storageBucket: "makeowndashboard.firebasestorage.app",
            messagingSenderId: "791722954695",
            appId: "1:791722954695:web:ce22cc59fad57d22d053e2"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.doc = doc;
        window.getDoc = getDoc;

    <style>
        :root {
            --primary: #086788;
        }

        body {
            font-family: "Noto Sans TC", sans-serif;
            background: transparent;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .preview-container {
            background: #fff;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .news-title {
            margin: 0;
        }

        .news-watermark {
            object-fit: contain;
        }

        .news-footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.85rem;
            color: #888;
        }

        .news-footer-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: left;
        }

        .news-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .news-footer a:hover {
            text-decoration: underline;
        }

        /* 🌟 恢復 12 格網格系統，讓電腦版可以完美並排！ */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 30px;
            /* 基礎高度對齊編輯器 */
            gap: 15px;
        }

        .preview-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            width: 100%;
        }

        .preview-card-title {
            margin-top: 0;
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .reset-filter-btn {
            background: #eee;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: auto;
            display: block;
            margin-bottom: 15px;
            color: #555;
        }

        .preview-card-title {
            margin-top: 0;
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .reset-filter-btn {
            background: #eee;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: auto;
            display: block;
            margin-bottom: 15px;
            color: #555;
        }

        /* 時間軸樣式 */
        .timeline-container {
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        .timeline-item {
            display: flex;
            position: relative;
        }

        .timeline-left {
            width: var(--time-width, 20%);
            flex-shrink: 0;
            text-align: right;
            padding-right: var(--timeline-gap, 15px);
            font-weight: bold;
            color: var(--time-color, var(--primary));
            font-size: 0.95rem;
            padding-top: 2px;
        }

        .timeline-right {
            flex: 1;
            padding-left: var(--timeline-gap, 20px);
            padding-bottom: 25px;
            border-left: 2px solid var(--line-color, var(--primary));
            position: relative;
        }

        .timeline-item:last-child .timeline-right {
            border-left-color: transparent !important;
        }

        .timeline-dot {
            position: absolute;
            left: -8px;
            top: 5px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--node-color, var(--primary));
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px var(--node-color, var(--primary));
            box-sizing: border-box;
            z-index: 2;
        }

        .timeline-title {
            margin: 0 0 5px 0;
            line-height: 1.4;
        }

        .timeline-desc {
            margin: 0;
            line-height: 1.6;
        }

        .timeline-link-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 12px;
            font-size: 0.85rem;
            color: var(--time-color, var(--primary));
            background: #fff;
            border: 1px solid var(--time-color, var(--primary));
            border-radius: 4px;
            text-decoration: none !important;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timeline-link-btn:hover {
            color: #fff;
            background: var(--time-color, var(--primary));
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .custom-btn-wrapper {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
        }

        .custom-btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            color: #fff;
            width: 80%;
            box-sizing: border-box;
        }

        /* 輪播卡片 (Carousel) 專用樣式 */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .carousel-slide {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px 30px;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-in-out;
            overflow-y: auto;
        }

        .carousel-img {
            max-width: 100%;
            max-height: 160px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .carousel-nav {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: 50%;
            width: 100%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .carousel-arrow {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.15);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 5px;
            font-weight: bold;
            transition: 0.2s;
        }

        .carousel-arrow:hover {
            background: var(--primary);
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 10px 0 5px 0;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        .carousel-dot.active {
            background: var(--primary);
            transform: scale(1.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 600px) {
            .news-header {
                flex-direction: row;
                align-items: center;
            }

            .news-watermark {
                margin-left: auto !important;
                max-width: 80px;
            }

            .news-footer {
                flex-direction: row;
            }

            .news-title {
                font-size: 1.4rem !important;
                word-break: break-word;
            }

            .preview-card {
                padding: 15px;
            }

            /* 🌟 手機版把網格變成堆疊 */
            .preview-grid {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        Chart.register(ChartDataLabels);

        function ChartComponent({ comp, rawData, filteredData, aggregateData, filters, onFilterChange, isChartVisible, isDropdownDisabled, firstDropdownCol, orderedDropdownCols, aggregateStackedData }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            const isChartType = ['barChart', 'pieChart', 'lineChart', 'stackedBarChart'].includes(comp.type);

            const [currentSlide, setCurrentSlide] = useState(0);
            useEffect(() => { setCurrentSlide(0); }, [filteredData]);

            useEffect(() => {
                if (isChartType && isChartVisible) {
                    if (!comp.categoryColumn || (!comp.valueColumn && !comp.stackValueColumns)) return;
                    const ctx = canvasRef.current.getContext('2d');
                    if (chartInstance.current) chartInstance.current.destroy();
                    let chartType = 'bar';
                    let options = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' }, title: { display: false }, datalabels: { display: false } } };
                    const pieColors = ['#086788', '#F0C808', '#E74C3C', '#2ECC71', '#9B59B6', '#34495E', '#E67E22', '#1ABC9C'];
                    const mainColor = comp.themeColor || '#086788';
                    let labels = [];
                    let datasets = [];

                    if (comp.type === 'stackedBarChart') {
                        chartType = 'bar';
                        const stackedData = aggregateStackedData(filteredData, comp.categoryColumn, comp.stackValueColumns || [], comp.aggregation);
                        labels = stackedData.categories; datasets = stackedData.datasets;
                        if (comp.chartOrientation === 'horizontal') {
                            options.indexAxis = 'y'; options.scales = { x: { stacked: true, max: comp.isPercentageStacked ? 100 : undefined }, y: { stacked: true } };
                        } else {
                            options.scales = { x: { stacked: true }, y: { stacked: true, max: comp.isPercentageStacked ? 100 : undefined } };
                        }
                        datasets.forEach((ds, idx) => { ds.backgroundColor = pieColors[idx % pieColors.length]; });
                        if (comp.isPercentageStacked) {
                            const numCategories = labels.length; const numDatasets = datasets.length;
                            for (let j = 0; j < numCategories; j++) {
                                let total = 0; for (let i = 0; i < numDatasets; i++) total += datasets[i].data[j];
                                if (total > 0) { for (let i = 0; i < numDatasets; i++) datasets[i].data[j] = (datasets[i].data[j] / total) * 100; }
                            }
                            options.plugins.datalabels = { display: true, formatter: (value) => value > 0 ? value.toFixed(0) + '%' : '', color: 'white', font: { weight: 'bold' } };
                        }
                    } else {
                        const aggData1 = aggregateData(filteredData, comp.categoryColumn, comp.valueColumn, comp.aggregation);
                        labels = Object.keys(aggData1); const data1 = Object.values(aggData1);
                        datasets = [{ label: comp.compareValueColumn ? comp.valueColumn : comp.title, data: data1, backgroundColor: comp.type === 'pieChart' ? pieColors : mainColor, borderColor: comp.type === 'lineChart' ? mainColor : undefined, fill: comp.type === 'lineChart' ? false : true }];
                        if (comp.compareValueColumn && comp.type !== 'pieChart') {
                            const aggData2 = aggregateData(filteredData, comp.categoryColumn, comp.compareValueColumn, comp.aggregation);
                            const data2 = labels.map(label => aggData2[label] || 0);
                            datasets.push({ label: comp.compareValueColumn, data: data2, backgroundColor: '#bdc3c7', borderColor: comp.type === 'lineChart' ? '#bdc3c7' : undefined, fill: comp.type === 'lineChart' ? false : true });
                        }
                        if (comp.type === 'pieChart') chartType = 'doughnut';
                        if (comp.type === 'lineChart') { chartType = 'line'; options.elements = { line: { tension: 0.3 } }; }
                        if (comp.type === 'barChart' && comp.chartOrientation === 'horizontal') options.indexAxis = 'y';
                    }
                    chartInstance.current = new Chart(ctx, { type: chartType, data: { labels, datasets }, options });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); }
            }, [comp, filteredData, isChartVisible]);

            // 🌟 恢復：把資料庫裡存的 x, y, w, h 抓出來，並轉成 CSS Grid 座標
            const colWidth = comp.layout?.desktopCols || comp.layout?.w || comp.w || 6;
            const colX = comp.layout?.x !== undefined ? (comp.layout.x + 1) : 'auto';
            const rowY = comp.layout?.y !== undefined ? (comp.layout.y + 1) : 'auto';

            const gridStyle = {
                /* 🌟 把座標餵給 CSS */
                gridColumn: colX !== 'auto' ? `${colX} / span ${colWidth}` : `span ${colWidth}`,
                gridRow: rowY !== 'auto' ? `${rowY} / span ${comp.layout?.h || comp.h || 6}` : 'auto',

                overflow: 'hidden',
                boxSizing: 'border-box',
                padding: comp.showTitle !== false ? '15px' : '0px 15px 15px 15px',
                display: 'flex',
                flexDirection: 'column',
                justifyContent: comp.showTitle !== false ? 'flex-start' : 'center',
                alignItems: 'stretch',
                minWidth: 0,
                width: '100%'
            };

            if (comp.type !== 'dropdown' && !isChartVisible) {
                return (
                    <div className="preview-card" style={gridStyle}>
                        {comp.showTitle !== false && comp.title && comp.type !== 'button' && <h3 className="preview-card-title" style={{ textAlign: 'center', width: '100%' }}>{comp.title}</h3>}
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#999', minHeight: '150px', background: '#f9f9f9', borderRadius: '8px', border: '2px dashed #ddd' }}>請先於上方選擇「{firstDropdownCol}」</div>
                    </div>
                );
            }

            const processAndFormatNumber = (rawValue) => {
                const multiplier = comp.multiplier !== undefined ? comp.multiplier : 1;
                let num = rawValue * multiplier; num = Math.round(num * 100000) / 100000;
                const format = comp.numberFormat || 'comma';
                if (format === 'plain') return num.toString();
                if (format === 'comma') return num.toLocaleString('zh-TW');
                if (num === 0) return '0';
                const isNegative = num < 0; let str = Math.abs(num).toString(); let [intPart, decPart] = str.split('.'); let result = ''; const units = ['', '萬', '億', '兆', '京']; let chunks = [];
                while (intPart.length > 0) { chunks.push(intPart.slice(-4)); intPart = intPart.slice(0, -4); }
                for (let i = chunks.length - 1; i >= 0; i--) {
                    let chunkNum = parseInt(chunks[i], 10);
                    if (chunkNum > 0) {
                        let chunkStr = chunkNum.toString();
                        if (format === 'zh-scale-qian' && i === 0 && chunkStr.length === 4) {
                            let qian = chunkStr[0]; let restNum = parseInt(chunkStr.slice(1), 10); chunkStr = restNum === 0 ? `${qian}千` : `${qian}千${restNum}`;
                        }
                        result += chunkStr + units[i];
                    }
                }
                if (isNegative) result = '-' + result; if (decPart) result += '.' + decPart;
                return result || '0';
            };

            const renderMetricOrText = () => {
                if (!filteredData || filteredData.length === 0) return <p style={{ color: '#999' }}>未綁定資料</p>;
                if (comp.type === 'metricCard') {
                    if (!comp.valueColumn) return <p style={{ color: '#999' }}>未綁定</p>;
                    let value = comp.aggregation === 'count' ? filteredData.length : filteredData.reduce((sum, row) => sum + (parseFloat(String(row[comp.valueColumn]).replace(/,/g, '')) || 0), 0);
                    const finalVal = `${comp.prefix || ''}${processAndFormatNumber(value)}${comp.suffix || ''}`;
                    const align = comp.textAlign === 'left' ? 'flex-start' : (comp.textAlign === 'right' ? 'flex-end' : 'center');
                    return <div style={{ display: 'flex', justifyContent: align, alignItems: 'center', flex: 1, width: '100%' }}><div style={{ color: comp.themeColor || '#086788', fontSize: comp.fontSize || '3.5rem', fontWeight: comp.fontWeight || '900', lineHeight: 1 }}>{finalVal}</div></div>;
                }
                if (comp.type === 'textCard') {
                    if (!comp.valueColumn) return <p style={{ color: '#999' }}>未綁定</p>;
                    const textContent = filteredData[filteredData.length - 1][comp.valueColumn] || '';
                    const align = comp.textAlign === 'left' ? 'flex-start' : (comp.textAlign === 'right' ? 'flex-end' : 'center');
                    return <div style={{ overflowY: 'auto', flex: 1, display: 'flex', alignItems: 'center', justifyContent: align, width: '100%' }}><p style={{ fontSize: comp.fontSize || '1.2rem', fontWeight: comp.fontWeight || 'normal', textAlign: comp.textAlign || 'left', color: comp.themeColor || '#333', lineHeight: '1.6', margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{textContent}</p></div>;
                }
                return null;
            };

            const renderMetricCompare = () => {
                if (comp.type !== 'metricCard' || !comp.compareValueColumn) return null;
                const compareValue = filteredData.reduce((sum, row) => sum + (parseFloat(String(row[comp.compareValueColumn]).replace(/,/g, '')) || 0), 0);
                const formattedCompareValue = processAndFormatNumber(compareValue);
                const finalCompareValue = `${comp.prefix || ''}${formattedCompareValue}${comp.suffix || ''}`;
                const align = comp.textAlign === 'left' ? 'left' : (comp.textAlign === 'right' ? 'right' : 'center');
                return <div className="metric-compare" style={{ color: '#999', fontSize: '0.85rem', marginTop: '10px', textAlign: align, width: '100%' }}>相比 {comp.compareValueColumn}：{finalCompareValue}</div>;
            };

            return (
                <div className="preview-card" style={gridStyle}>
                    {comp.showTitle !== false && comp.title && comp.type !== 'button' && <h3 className="preview-card-title" style={{ textAlign: 'center', width: '100%' }}>{comp.title}</h3>}
                    {(comp.type === 'metricCard' || comp.type === 'textCard') && <div style={{ width: '100%', flex: '1 1 auto', display: 'flex', flexDirection: 'column', justifyContent: 'center', minHeight: '80px' }}>{renderMetricOrText()}{renderMetricCompare()}</div>}
                    {isChartType && <div style={{ position: 'relative', flex: '1 1 auto', width: '100%', minHeight: '200px' }}><canvas ref={canvasRef}></canvas></div>}
                    {comp.type === 'dropdown' && (() => {
                        if (!comp.categoryColumn) return <p style={{ color: '#999' }}>未綁定</p>;
                        if (isDropdownDisabled) return <select disabled style={{ padding: '10px', fontSize: '1rem', width: '100%' }}><option>請先選擇上一層</option></select>;
                        const myIndex = orderedDropdownCols.indexOf(comp.categoryColumn);
                        const upstreamCols = myIndex > 0 ? orderedDropdownCols.slice(0, myIndex) : [];
                        const optionsData = rawData.filter(row => { for (let uCol of upstreamCols) { if (filters[uCol] && row[uCol] !== filters[uCol]) return false; } return true; });
                        const options = [...new Set(optionsData.map(r => r[comp.categoryColumn]))].filter(Boolean).sort();
                        return <select style={{ padding: '10px', fontSize: '1rem', width: '100%' }} value={filters[comp.categoryColumn] || ''} onChange={(e) => onFilterChange(comp.categoryColumn, e.target.value)}><option value="">請選擇 {comp.categoryColumn}...</option>{options.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>;
                    })()}
                    {comp.type === 'button' && <div className="custom-btn-wrapper" style={{ padding: '10px 0' }}><a href={comp.buttonUrl || '#'} target="_blank" rel="noreferrer" className="custom-btn" style={{ background: comp.themeColor || '#086788' }}>{comp.title || '點擊連結'}</a></div>}

                    {comp.type === 'timeline' && (
                        <div className="timeline-container" style={{ '--time-width': `${comp.timeWidthPercent || 20}%`, '--timeline-gap': `${comp.timelineGap || 20}px`, '--time-color': comp.timeColor || '#086788', '--line-color': comp.lineColor || '#086788', '--node-color': comp.nodeColor || '#086788' }}>
                            {(!comp.categoryColumn || (!comp.valueColumn && !comp.compareValueColumn)) ? <p>請綁定欄位</p> : filteredData.map((row, idx) => {
                                if (!row[comp.categoryColumn] && !row[comp.valueColumn] && !row[comp.compareValueColumn]) return null;
                                return (
                                    <div key={idx} className="timeline-item">
                                        <div className="timeline-left">{row[comp.categoryColumn] || ''}</div>
                                        <div className="timeline-right">
                                            <div className="timeline-dot"></div>
                                            {row[comp.valueColumn] && (
                                                <h4 className="timeline-title" style={{ color: comp.titleColor || '#333', fontSize: comp.titleSize || '1.1rem', fontWeight: comp.titleWeight || '900', textDecoration: 'none' }}>{row[comp.valueColumn]}</h4>
                                            )}
                                            {comp.compareValueColumn && row[comp.compareValueColumn] && <p className="timeline-desc" style={{ whiteSpace: 'pre-wrap', wordBreak: 'break-word', color: comp.descColor || '#666', fontSize: comp.descSize || '0.95rem', fontWeight: comp.descWeight || 'normal', marginTop: row[comp.valueColumn] ? '0' : '3px' }}>{row[comp.compareValueColumn]}</p>}
                                            {comp.linkColumn && row[comp.linkColumn] && (
                                                <a href={row[comp.linkColumn]} target="_blank" rel="noreferrer" className="timeline-link-btn">看相關新聞 ↗</a>
                                            )}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    )}

                    {comp.type === 'carousel' && (
                        <div className="carousel-container" style={{ '--primary': comp.themeColor || '#086788' }}>
                            {(!comp.categoryColumn && !comp.valueColumn && !comp.imageColumn) ? <p style={{ color: '#999', textAlign: 'center', marginTop: '20px' }}>請綁定欄位</p> : (
                                <>
                                    <div className="carousel-slide">
                                        {filteredData[currentSlide] && (
                                            <>
                                                {comp.imageColumn && filteredData[currentSlide][comp.imageColumn] && <img src={filteredData[currentSlide][comp.imageColumn]} className="carousel-img" alt="slide" />}
                                                {comp.categoryColumn && filteredData[currentSlide][comp.categoryColumn] && <h3 style={{ color: comp.titleColor || '#333', fontSize: comp.titleSize || '1.3rem', margin: '0 0 10px 0' }}>{filteredData[currentSlide][comp.categoryColumn]}</h3>}
                                                {comp.valueColumn && filteredData[currentSlide][comp.valueColumn] && <p style={{ color: comp.descColor || '#666', fontSize: comp.descSize || '1rem', whiteSpace: 'pre-wrap', wordBreak: 'break-word', margin: 0, lineHeight: '1.6' }}>{filteredData[currentSlide][comp.valueColumn]}</p>}
                                            </>
                                        )}
                                    </div>
                                    {filteredData.length > 1 && (
                                        <>
                                            <div className="carousel-nav">
                                                <button className="carousel-arrow" onClick={(e) => { e.stopPropagation(); setCurrentSlide(prev => prev > 0 ? prev - 1 : filteredData.length - 1); }}>&lt;</button>
                                                <button className="carousel-arrow" onClick={(e) => { e.stopPropagation(); setCurrentSlide(prev => prev < filteredData.length - 1 ? prev + 1 : 0); }}>&gt;</button>
                                            </div>
                                            <div className="carousel-dots">
                                                {filteredData.map((_, i) => <div key={i} className={`carousel-dot ${i === currentSlide ? 'active' : ''}`} onClick={(e) => { e.stopPropagation(); setCurrentSlide(i); }}></div>)}
                                            </div>
                                        </>
                                    )}
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // 🌟 更新版 PreviewViewer：支援多重資料庫 (BI 引擎)
        function PreviewViewer({ config }) {
            const [dataMap, setDataMap] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filters, setFilters] = useState({});

            useEffect(() => {
                const fetchData = async () => {
                    // 為了相容新舊資料結構，加上防呆：如果沒有 sheetSources 但有 dataSource，幫它轉換
                    const sourcesToFetch = config.sheetSources || (config.dataSource ? [{ id: 'ds_legacy', sheetId: config.dataSource.sheetId, gid: config.dataSource.gid }] : []);

                    if (sourcesToFetch.length === 0) {
                        setError("未設定 Google Sheet 資料庫");
                        setLoading(false); return;
                    }
                    try {
                        const newDataMap = {};
                        await Promise.all(sourcesToFetch.map(async (source) => {
                            if (!source.sheetId) return;
                            const url = `https://docs.google.com/spreadsheets/d/${source.sheetId}/gviz/tq?tqx=out:json&headers=1&tq&gid=${source.gid || '0'}`;
                            const res = await fetch(url);
                            const text = await res.text();
                            const json = JSON.parse(text.substring(47, text.length - 2));

                            let cols = json.table.cols.map(c => c.label).filter(l => l && l.trim() !== '');
                            let rowsData = json.table.rows;
                            if (cols.length === 0 && rowsData.length > 0) {
                                cols = rowsData[0].c.map(cell => cell ? (cell.f || cell.v || '') : '').filter(l => String(l).trim() !== '');
                                rowsData = rowsData.slice(1);
                            }
                            const parsedData = rowsData.map(row => {
                                let obj = {};
                                row.c.forEach((cell, i) => { if (cols[i]) obj[cols[i]] = cell ? (cell.f ? String(cell.f) : (cell.v !== null ? String(cell.v) : '')) : ''; });
                                return obj;
                            });
                            newDataMap[source.id] = parsedData;
                        }));
                        setDataMap(newDataMap);
                    } catch (err) { setError("資料讀取失敗，請確認權限。"); }
                    setLoading(false);
                };
                fetchData();
            }, [config]);

            const sortedComponents = [...config.components].sort((a, b) => { if (a.layout.y === b.layout.y) return a.layout.x - b.layout.x; return a.layout.y - b.layout.y; });
            const dropdownComps = sortedComponents.filter(c => c.type === 'dropdown');
            const orderedDropdownCols = dropdownComps.map(c => c.categoryColumn);
            const firstDropdownCol = dropdownComps.length > 0 ? dropdownComps[0].categoryColumn : null;
            const isChartVisible = firstDropdownCol ? !!filters[firstDropdownCol] : true;

            const dropdownState = {};
            for (let i = 0; i < dropdownComps.length; i++) {
                const col = dropdownComps[i].categoryColumn;
                if (i === 0) dropdownState[col] = false; else dropdownState[col] = !filters[dropdownComps[i - 1].categoryColumn];
            }

            // 🌟 跨表過濾器核心邏輯
            const filteredDataMap = {};
            const sourcesToUse = config.sheetSources || (config.dataSource ? [{ id: 'ds_legacy' }] : []);
            sourcesToUse.forEach(source => {
                const sourceData = dataMap[source.id] || [];
                filteredDataMap[source.id] = sourceData.filter(row => {
                    for (let key in filters) {
                        if (filters[key] && row[key] !== undefined && row[key] !== filters[key]) return false;
                    }
                    return true;
                });
            });

            const handleFilterChange = (column, value) => {
                setFilters(prev => {
                    const newFilters = { ...prev, [column]: value };
                    const changedIdx = dropdownComps.findIndex(c => c.categoryColumn === column);
                    if (changedIdx !== -1) { for (let i = changedIdx + 1; i < dropdownComps.length; i++) newFilters[dropdownComps[i].categoryColumn] = ''; }
                    return newFilters;
                });
            };

            const aggregateData = (rawData, categoryCol, valueCol, aggType) => {
                if (!valueCol) return {}; let result = {};
                rawData.forEach(row => {
                    let catRaw = categoryCol ? (row[categoryCol] || '未分類') : '總計';
                    if (aggType === 'first') { if (result[catRaw] === undefined) result[catRaw] = row[valueCol] || ''; return; }
                    if (typeof catRaw === 'string' && catRaw.includes('|') && catRaw.includes(':')) {
                        catRaw.split('|').forEach(part => {
                            let [subCat, subValStr] = part.split(':');
                            if (subCat && subValStr !== undefined) {
                                let val = parseFloat(String(subValStr).replace(/,/g, '')) || 0;
                                if (val > 0) { if (aggType === 'sum') result[subCat] = (result[subCat] || 0) + val; else if (aggType === 'count') result[subCat] = (result[subCat] || 0) + 1; }
                            }
                        });
                    } else {
                        let val = parseFloat(String(row[valueCol]).replace(/,/g, '')) || 0;
                        if (val > 0 || aggType === 'count') { if (aggType === 'sum') result[catRaw] = (result[catRaw] || 0) + val; else if (aggType === 'count') result[catRaw] = (result[catRaw] || 0) + 1; }
                    }
                });
                return result;
            };

            const aggregateStackedData = (rawData, categoryCol, valueCols, aggType) => {
                const categories = [...new Set(rawData.map(r => r[categoryCol]))].filter(Boolean).sort();
                let datasetsMap = {};
                categories.forEach((cat, catIndex) => {
                    const rows = rawData.filter(r => r[categoryCol] === cat);
                    rows.forEach(r => {
                        valueCols.forEach(col => {
                            if (!col) return; let valRaw = r[col];
                            if (typeof valRaw === 'string' && valRaw.includes('|') && valRaw.includes(':')) {
                                valRaw.split('|').forEach(part => {
                                    let [subCat, subValStr] = part.split(':');
                                    if (subCat && subValStr !== undefined) {
                                        let val = parseFloat(String(subValStr).replace(/,/g, '')) || 0;
                                        if (!datasetsMap[subCat]) datasetsMap[subCat] = new Array(categories.length).fill(0);
                                        if (aggType === 'sum') datasetsMap[subCat][catIndex] += val; else if (aggType === 'count' && val > 0) datasetsMap[subCat][catIndex] += 1;
                                    }
                                });
                            } else {
                                let val = parseFloat(String(valRaw).replace(/,/g, '')) || 0;
                                if (!datasetsMap[col]) datasetsMap[col] = new Array(categories.length).fill(0);
                                if (aggType === 'sum') datasetsMap[col][catIndex] += val; else if (aggType === 'count' && val > 0) datasetsMap[col][catIndex] += 1;
                            }
                        });
                    });
                });
                return { categories, datasets: Object.keys(datasetsMap).map(label => ({ label, data: datasetsMap[label] })) };
            };

            if (loading) return <div className="preview-container"><h3 style={{ textAlign: 'center' }}>資料庫連線中...</h3></div>;
            if (error) return <div className="preview-container"><h3 style={{ color: 'red', textAlign: 'center' }}>{error}</h3></div>;

            return (
                <div className="preview-container">
                    <div className="news-header">
                        <div style={{ flex: 1, textAlign: config.meta.titleAlign || 'left' }}>
                            <h2 className="news-title" style={{ color: config.meta.titleColor || '#222', fontSize: config.meta.titleFontSize || '1.8rem', fontWeight: config.meta.titleFontWeight || '900', fontFamily: config.meta.titleFontFamily || 'inherit' }}>
                                {config.meta.title}
                            </h2>
                        </div>
                        {config.meta.watermarkUrl && config.meta.watermarkPosition === 'top-right' && <img src={config.meta.watermarkUrl} alt="Watermark" className="news-watermark" style={{ height: `${config.meta.watermarkSize || 40}px` }} />}
                    </div>

                    {Object.values(filters).some(v => v) && <button className="reset-filter-btn" onClick={() => setFilters({})}>↺ 清除所有篩選</button>}

                    <div className="preview-grid">
                        {sortedComponents.map(comp => {
                            // 🌟 防呆：相容舊的單一資料結構
                            const dataSourceIdToUse = comp.dataSourceId || 'ds_legacy';
                            return (
                                <ChartComponent
                                    key={comp.id} comp={comp}
                                    rawData={dataMap[dataSourceIdToUse] || []}
                                    filteredData={filteredDataMap[dataSourceIdToUse] || []}
                                    aggregateData={aggregateData} filters={filters} onFilterChange={handleFilterChange}
                                    isChartVisible={isChartVisible} isDropdownDisabled={dropdownState[comp.categoryColumn]}
                                    firstDropdownCol={firstDropdownCol} orderedDropdownCols={orderedDropdownCols}
                                    aggregateStackedData={aggregateStackedData}
                                />
                            )
                        })}
                    </div>

                    <div className="news-footer">
                        <div className="news-footer-left">
                            {config.meta.lastUpdated && <div>🕒 更新時間：{config.meta.lastUpdated}</div>}
                            {config.meta.dataSources && config.meta.dataSources.length > 0 && (
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px' }}>
                                    <span>資料來源：</span>
                                    {config.meta.dataSources.map((source, idx) => (
                                        <span key={idx}>
                                            {source.url ? <a href={source.url} target="_blank" rel="noreferrer">{source.name || '未命名'}</a> : <span>{source.name || '未命名'}</span>}
                                            {idx < config.meta.dataSources.length - 1 && '、'}
                                        </span>
                                    ))}
                                </div>
                            )}
                        </div>
                        {config.meta.watermarkUrl && config.meta.watermarkPosition === 'bottom-right' && <img src={config.meta.watermarkUrl} alt="Watermark" className="news-watermark" style={{ height: `${config.meta.watermarkSize || 40}px` }} />}
                    </div>
                </div>
            );
        }

        function ViewerApp() {
            const [config, setConfig] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchConfig = async () => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) { setError('❌ 網址錯誤：找不到儀表板 ID。'); return; }
                    try {
                        if (!window.db) throw new Error("Firebase 尚未載入");
                        const docSnap = await window.getDoc(window.doc(window.db, "dashboards", id));
                        if (docSnap.exists()) setConfig(docSnap.data());
                        else setError('❌ 找不到此儀表板，請確認 ID 是否正確。');
                    } catch (err) {
                        console.error(err);
                        setError('❌ 無法連線至資料庫，請稍後再試。');
                    }
                };
                fetchConfig();
            }, []);

            if (error) return <div style={{ padding: '20px', color: 'red', textAlign: 'center', fontFamily: 'sans-serif' }}><h2>{error}</h2></div>;
            if (!config) return <div style={{ padding: '20px', textAlign: 'center', fontFamily: 'sans-serif', color: '#666' }}><h2>載入中...</h2></div>;

            return <PreviewViewer config={config} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ViewerApp />);
    </script>
</body>

</html>
